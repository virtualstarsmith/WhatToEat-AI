<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" fill="none">
  <!-- 扁平橙色签筒：竹筒主体 + 露出的签条 + 红缨装饰。
       风格：单色系（橙 #FF6B35 + 深棕 + 红缨），扁平几何，
       融入项目现有扁平+橙色视觉体系。 -->

  <!-- 露出的签条（从筒口伸出，4 根错落） -->
  <!-- 签条1：最高一根，顶部红缨 -->
  <rect x="50" y="18" width="6" height="46" rx="2" fill="#F4E4C1" stroke="#C9A876" stroke-width="1.5"/>
  <circle cx="53" cy="16" r="4.5" fill="#E63946"/>
  <!-- 签条2：略低 -->
  <rect x="62" y="26" width="6" height="38" rx="2" fill="#F4E4C1" stroke="#C9A876" stroke-width="1.5"/>
  <circle cx="65" cy="24" r="4" fill="#E63946"/>
  <!-- 签条3：中等高，无缨 -->
  <rect x="40" y="32" width="6" height="32" rx="2" fill="#F4E4C1" stroke="#C9A876" stroke-width="1.5"/>
  <!-- 签条4：最矮 -->
  <rect x="72" y="38" width="6" height="26" rx="2" fill="#F4E4C1" stroke="#C9A876" stroke-width="1.5"/>

  <!-- 签筒主体：略上宽下窄的梯形（竹筒自然形态），橙色 -->
  <path d="M 28 64 L 92 64 L 88 122 L 32 122 Z" fill="#FF6B35"/>
  <!-- 筒口（椭圆，深色，形成开口阴影感） -->
  <ellipse cx="60" cy="64" rx="32" ry="6.5" fill="#C44A1F"/>
  <ellipse cx="60" cy="63" rx="28" ry="4.5" fill="#7A2E18"/>

  <!-- 筒身装饰：两道竹节横纹（深橙，半透明） -->
  <path d="M 31 83 L 89 83" stroke="#C44A1F" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
  <path d="M 32 101 L 88 101" stroke="#C44A1F" stroke-width="3" stroke-linecap="round" opacity="0.55"/>

  <!-- 筒身贴纸标签（白色小圆 + "签"字，呼应功能名） -->
  <circle cx="60" cy="92" r="9" fill="#FFF8F3"/>
  <text x="60" y="96" text-anchor="middle" font-size="11" font-weight="700" fill="#FF6B35" font-family="sans-serif">签</text>
</svg>

