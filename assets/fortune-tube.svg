<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" fill="none">
  <!-- 创意签筒：饭桶 + 筷子（美食场景同构）。
       筷子=签，饭桶=签筒，米饭=桶内填充。
       风格：扁平橙系，桶身胖圆亲切，筷子深色简约。 -->

  <!-- 露出的筷子（3 根错落，从桶口伸出，深棕木质） -->
  <!-- 筷1：最高，顶部橙色装饰圈（呼应主题色） -->
  <rect x="48" y="14" width="4.5" height="52" rx="2" fill="#8B5A3C"/>
  <rect x="47" y="12" width="7" height="4" rx="1.5" fill="#FF6B35"/>
  <!-- 筷2：中等高 -->
  <rect x="58" y="22" width="4.5" height="44" rx="2" fill="#8B5A3C"/>
  <rect x="57" y="20" width="7" height="4" rx="1.5" fill="#FF6B35"/>
  <!-- 筷3：略矮 -->
  <rect x="68" y="28" width="4.5" height="38" rx="2" fill="#8B5A3C"/>

  <!-- 饭桶主体：胖梯形（上口略宽），橙色 -->
  <path d="M 22 66 L 98 66 L 92 124 L 28 124 Z" fill="#FF6B35"/>

  <!-- 桶口边缘：深橙描边圈 -->
  <ellipse cx="60" cy="66" rx="38" ry="7" fill="#C44A1F"/>
  <!-- 桶内米饭：白色椭圆（露出桶口的饭） -->
  <ellipse cx="60" cy="65" rx="33" ry="5" fill="#FFF8F3"/>

  <!-- 饭粒点缀（小白点，让米饭感更强） -->
  <circle cx="50" cy="64" r="1.3" fill="#FFFFFF"/>
  <circle cx="60" cy="66" r="1.3" fill="#FFFFFF"/>
  <circle cx="70" cy="64" r="1.3" fill="#FFFFFF"/>
  <circle cx="44" cy="65" r="1.1" fill="#FFFFFF"/>
  <circle cx="76" cy="65" r="1.1" fill="#FFFFFF"/>

  <!-- 桶身装饰：一道腰线（深橙，桶箍） -->
  <path d="M 27 92 L 93 92" stroke="#C44A1F" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/>

  <!-- 桶身"饭"字标签（白色圆 + 橙字） -->
  <circle cx="60" cy="105" r="11" fill="#FFF8F3"/>
  <text x="60" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#FF6B35" font-family="sans-serif">饭</text>
</svg>
